name: build-and-lint
on:
  push:
    branches: [main,dev]
  pull_request:
    branches: [main,dev]
jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        use: actions/checkout@v3

      - name: Setup Node
        use: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Backend Dependencies
        working-directory: mern-project-to-deploy/server
        run: npm ci

      - name: Lint Backend
        working-directory: mern-project-to-deploy/server
        run: npm run lint -- --max-warning=0

      - name: Install Frontend Dependencies
        working-directory: mern-project-to-deploy/client
        run: npm ci

      - name: Lint Frontend
        working-directory: mern-project-to-deploy/client
        run: npm run lint -- --max-warning=0

      - name: Build Backend Image
        run: docker build -t backend ./server

      - name: Build Frontend Image
        run: docker build -t frontend ./client

      